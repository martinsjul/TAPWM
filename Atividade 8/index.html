<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 8 - Arrays</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Atividade 8 - Exercícios de Array</h1>

        <div class="card">
            <h2>Exercício 1</h2>
            <p>Criar uma função que recebe 3 números, calcula a soma, o quadrado do primeiro e o quadrado do segundo
                (usando <strong>APPLY</strong>).</p>

            <label for="inputEx1">Digite 3 números separados por vírgula:</label>
            <input type="text" id="inputEx1" placeholder="Ex: 2, 4, 6">
            <button onclick="executarEx1()">Calcular</button>

            <div class="resultado" id="resultadoEx1"></div>
        </div>

        <div class="card">
            <h2>Exercício 2</h2>
            <p>Criar uma função que recebe 5 letras e forma 10 palavras distintas (usando <strong>APPLY</strong> e
                <strong>PUSH</strong>).</p>

            <label for="inputEx2">Digite 5 letras separadas por vírgula:</label>
            <input type="text" id="inputEx2" placeholder="Ex: A, B, C, D, E">
            <button onclick="executarEx2()">Gerar Palavras</button>

            <div class="resultado" id="resultadoEx2"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
